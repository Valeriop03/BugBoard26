<section class="login-page">
  <div class="panel">
    <h1>Accesso</h1>
    <p>Login con email e password. Il collegamento alle API verra aggiunto nello step autenticazione.</p>

    <form class="form">
      <label>
        Email
        <input type="email" name="email" [(ngModel)]="email" placeholder="admin@bugboard26.local">
      </label>

      <label>
        Password
        <input type="password" name="password" [(ngModel)]="password" placeholder="Password">
      </label>

      <button type="button">Entra</button>
    </form>
  </div>
</section>
